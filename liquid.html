<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLI - Liquid</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(270deg, #000000, #06110a, #00130f, #000000);
      background-size: 800% 800%;
      animation: liquidBG 18s ease infinite;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow-x: hidden;
      position: relative;
    }
    @keyframes liquidBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .bg-image {
      position: fixed;
      inset: -10%;
      background: url('M3 カット2.jpeg') center center / cover no-repeat;
      opacity: 0.16;
      filter: blur(26px) saturate(1.2);
      transform: scale(1.08);
      z-index: -3;
      animation: bgFloat 22s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(0, 255, 102, 0.16), transparent 32%),
        radial-gradient(circle at 80% 30%, rgba(0, 255, 102, 0.10), transparent 28%),
        radial-gradient(circle at 50% 80%, rgba(255, 255, 255, 0.06), transparent 30%);
      z-index: -2;
      animation: glowMove 14s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,102,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,102,0.08) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.45), rgba(0,0,0,0.95));
      -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0.45), rgba(0,0,0,0.95));
      z-index: -1;
      opacity: 0.35;
      pointer-events: none;
    }

    @keyframes bgFloat {
      0% {
        transform: scale(1.08) translate(0px, 0px);
      }
      100% {
        transform: scale(1.14) translate(-24px, -18px);
      }
    }

    @keyframes glowMove {
      0% {
        transform: translate(0px, 0px) scale(1);
      }
      100% {
        transform: translate(-12px, 18px) scale(1.08);
      }
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
      box-sizing: border-box;
      position: relative;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 8px;
      letter-spacing: 4px;
      text-shadow: 0 0 18px rgba(0, 255, 102, 0.28);
    }

    h2 {
      font-size: 24px;
      margin-bottom: 12px;
      font-weight: normal;
      opacity: 0.9;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.12);
    }

    p {
      max-width: 480px;
      line-height: 1.7;
      opacity: 0.9;
      margin-bottom: 28px;
      background: rgba(0, 0, 0, 0.18);
      padding: 12px 16px;
      border-radius: 16px;
      backdrop-filter: blur(6px);
    }

    .button {
      display: inline-block;
      padding: 14px 28px;
      margin: 8px;
      border: 1px solid #00ff66;
      color: #00ff66;
      text-decoration: none;
      border-radius: 999px;
      transition: 0.2s;
      background: rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(8px);
      box-shadow: 0 0 18px rgba(0, 255, 102, 0.12);
    }

    .button:hover {
      background: #00ff66;
      color: black;
      box-shadow: 0 0 28px rgba(0, 255, 102, 0.4);
    }

    .links {
      margin-top: 12px;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 36px;
      }

      h2 {
        font-size: 20px;
      }

      p {
        font-size: 14px;
      }

      .button {
        width: 80%;
        max-width: 280px;
        box-sizing: border-box;
      }
    }
  </style>
</head>
<body>
  <div class="bg-image"></div>
  <div class="bg-glow"></div>
  <div class="bg-grid"></div>
  <div class="wrap">
    <h1>GLI</h1>
    <h2>Liquid</h2>
    <p>
      NEO Y2Kの質感と、液体のように揺れるグルーヴ。
      ここからGLIの音に触れてください。
    </p>

    <div class="links">
      <a class="button" href="https://www.youtube.com/@glieru8626" target="_blank">YouTube</a>
      <a class="button" href="https://x.com/glieru" target="_blank">X</a>
      <a class="button" href="music.html">MUSIC</a>
    </div>
  </div>
</body>
</html>
